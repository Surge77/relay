name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: gateway/go.sum
      - name: Build gateway binaries
        working-directory: gateway
        run: |
          GOOS=linux  GOARCH=amd64 go build -o ../dist/relay-gateway-linux-amd64   ./cmd/gateway
          GOOS=windows GOARCH=amd64 go build -o ../dist/relay-gateway-windows-amd64.exe ./cmd/gateway
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
