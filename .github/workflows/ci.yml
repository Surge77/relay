name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  gateway:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: relay
          POSTGRES_PASSWORD: relay
          POSTGRES_DB: relay
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U relay"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      POSTGRES_URL: postgres://relay:relay@localhost:5432/relay?sslmode=disable
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: gateway/go.sum
      - name: Install golang-migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
      - name: Migrate
        run: ~/go/bin/migrate -path migrations -database "$POSTGRES_URL" up
      - name: Build + vet + test
        working-directory: gateway
        run: |
          go build ./...
          go vet ./...
          go test ./... -race -cover
          go test -tags=integration ./... -count=1

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Lint + typecheck + test + build
        working-directory: web
        run: |
          npm run lint
          npx tsc --noEmit
          npm test
          npm run build

  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose
        working-directory: deploy
        env:
          JWT_SECRET: ci-validate
        run: docker compose config -q
      - name: Build gateway image
        run: docker build --build-arg CMD=gateway -t relay-gateway:ci gateway
      - name: Build api image
        run: docker build --build-arg CMD=api -t relay-api:ci gateway
