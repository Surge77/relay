events {}

http {
  # Any gateway node can serve any connection, so plain round-robin is correct —
  # no sticky sessions needed. Reconnects land on whichever node answers.
  upstream relay_gateways {
    server gateway1:8080;
    server gateway2:8080;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 8080;

    location /ws {
      proxy_pass http://relay_gateways;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header Origin $http_origin;
      proxy_set_header X-Real-IP $remote_addr;
      # WebSockets are long-lived; don't let nginx time them out mid-stream.
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location /healthz {
      proxy_pass http://relay_gateways;
    }
  }
}
