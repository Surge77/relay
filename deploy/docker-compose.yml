# Relay full-stack deployment: Postgres + Redis, a 2-node gateway fleet behind an
# nginx load balancer, the stateless REST api, and the Next.js web client.
# Proves the cross-node path locally/CI on Linux (the dev workflow itself stays
# Docker-free on Windows). Scale the fleet with more gatewayN services + upstreams.
#
#   cd deploy && cp .env.example .env   # set JWT_SECRET
#   docker compose up --build

name: relay

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d relay"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  migrate:
    image: migrate/migrate:v4.18.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../migrations:/migrations:ro
    command:
      ["-path", "/migrations", "-database",
       "postgres://relay:relay@postgres:5432/relay?sslmode=disable", "up"]

  api:
    build:
      context: ../gateway
      args:
        CMD: api
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    environment:
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in deploy/.env}
      POSTGRES_URL: postgres://relay:relay@postgres:5432/relay?sslmode=disable
      REDIS_URL: redis://redis:6379
      API_PORT: "9000"
      UPLOAD_DIR: /data/uploads
      ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - uploads:/data/uploads

  gateway1:
    build:
      context: ../gateway
      args:
        CMD: gateway
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    environment:
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in deploy/.env}
      POSTGRES_URL: postgres://relay:relay@postgres:5432/relay?sslmode=disable
      REDIS_URL: redis://redis:6379
      GATEWAY_PORT: "8080"
      NODE_ID: gw1
      ALLOWED_ORIGINS: http://localhost:3000

  gateway2:
    build:
      context: ../gateway
      args:
        CMD: gateway
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    environment:
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in deploy/.env}
      POSTGRES_URL: postgres://relay:relay@postgres:5432/relay?sslmode=disable
      REDIS_URL: redis://redis:6379
      GATEWAY_PORT: "8080"
      NODE_ID: gw2
      ALLOWED_ORIGINS: http://localhost:3000

  lb:
    image: nginx:1.27-alpine
    depends_on: [gateway1, gateway2]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"

  web:
    build:
      context: ../web
      args:
        NEXT_PUBLIC_GATEWAY_WS: ws://localhost:8080/ws
    depends_on: [api, lb]
    environment:
      API_ORIGIN: http://api:9000
    ports:
      - "3000:3000"

volumes:
  pgdata:
  uploads:
